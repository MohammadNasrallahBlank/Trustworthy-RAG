<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- title + tagline -->
  <text x="64" y="112" fill="#f9fafb" font-size="56" font-weight="800">Trustworthy RAG</text>
  <text x="66" y="154" fill="#9ca3af" font-size="22" font-weight="500">Grounded, <tspan fill="#60a5fa">cited</tspan> answers &#8212; or an honest <tspan fill="#a78bfa">&#8220;I don&#8217;t know.&#8221;</tspan></text>

  <!-- pipeline: the proven core path -->
  <g font-size="15" font-weight="600">
    <g transform="translate(64,206)">
      <rect width="88" height="34" rx="17" fill="#1f2937" stroke="#374151"/>
      <text x="44" y="22" fill="#e5e7eb" text-anchor="middle">retrieve</text>
    </g>
    <g transform="translate(164,206)">
      <rect width="80" height="34" rx="17" fill="#1f2937" stroke="#374151"/>
      <text x="40" y="22" fill="#e5e7eb" text-anchor="middle">rerank</text>
    </g>
    <g transform="translate(256,206)">
      <rect width="96" height="34" rx="17" fill="#1f2937" stroke="#374151"/>
      <text x="48" y="22" fill="#e5e7eb" text-anchor="middle">generate</text>
    </g>
    <g transform="translate(364,206)">
      <rect width="76" height="34" rx="17" fill="#0b2a4a" stroke="#2563eb"/>
      <text x="38" y="22" fill="#93c5fd" text-anchor="middle">verify</text>
    </g>
    <g transform="translate(452,206)">
      <rect width="158" height="34" rx="17" fill="#06281c" stroke="#16a34a"/>
      <text x="79" y="22" fill="#86efac" text-anchor="middle">cite &#183; answer / abstain</text>
    </g>
  </g>
  <text x="66" y="278" fill="#6b7280" font-size="13">+ optional self-correction loop (off by default)</text>

  <!-- right panel: the measured result -->
  <g transform="translate(860,0)">
    <rect x="0" y="0" width="340" height="320" fill="#0b1220"/>
    <rect x="50" y="50" width="240" height="4" rx="2" fill="url(#accent)"/>
    <text x="170" y="84" fill="#9ca3af" font-size="14" text-anchor="middle">HotpotQA &#183; real Qwen2.5-3B</text>

    <text x="170" y="150" fill="#86efac" font-size="48" font-weight="800" text-anchor="middle">100% &#8594; 55%</text>
    <text x="170" y="178" fill="#e5e7eb" font-size="15" font-weight="600" text-anchor="middle">unsupported confident answers</text>
    <text x="170" y="200" fill="#9ca3af" font-size="12.5" text-anchor="middle">vs 91% for a prompted &#8220;say I don&#8217;t know&#8221;</text>

    <text x="170" y="252" fill="#f3f4f6" font-size="22" font-weight="700" text-anchor="middle">96% coverage kept</text>
    <text x="170" y="276" fill="#9ca3af" font-size="12.5" text-anchor="middle">3.7% false refusal &#183; 3&#215; better calibrated</text>
  </g>
</svg>
